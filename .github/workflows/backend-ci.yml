name: Backend CI

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify main.py imports
        run: python -c "import main; print('main.py imports OK')"

      - name: Start server and smoke test endpoints
        run: |
          uvicorn main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!

          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done

          curl -sf http://127.0.0.1:8000/api/health | grep -q '"status":"ok"'
          curl -sf http://127.0.0.1:8000/api/cache/status | grep -q '"cached_keys"'

          kill $SERVER_PID
          wait $SERVER_PID 2>/dev/null || true
