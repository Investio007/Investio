name: Supabase backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump Supabase database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "SUPABASE_DB_URL secret not set — add it in GitHub → Settings → Secrets"
            exit 1
          fi
          mkdir -p backups
          stamp=$(date -u +%Y%m%d)
          pg_dump "$SUPABASE_DB_URL" --no-owner --no-acl -f "backups/investio-${stamp}.sql"
          echo "Backup size: $(wc -c < backups/investio-${stamp}.sql) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backups/
          retention-days: 90
