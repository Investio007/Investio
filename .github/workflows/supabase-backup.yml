name: Supabase backup

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump Supabase database
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          # West EU (Ireland) — change if your project region differs
          SUPABASE_POOLER_HOST: aws-0-eu-west-1.pooler.supabase.com
        run: |
          set -euo pipefail
          mkdir -p backups
          stamp=$(date -u +%Y%m%d)
          outfile="backups/investio-${stamp}.sql"

          if [ -n "${SUPABASE_DB_PASSWORD:-}" ] && [ -n "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Using session pooler (IPv4) via pg_dump..."
            export PGPASSWORD="$SUPABASE_DB_PASSWORD"
            export PGSSLMODE=require
            pg_dump \
              -h "$SUPABASE_POOLER_HOST" \
              -p 5432 \
              -U "postgres.${SUPABASE_PROJECT_REF}" \
              -d postgres \
              --no-owner --no-acl \
              -f "$outfile"
          elif [ -n "${SUPABASE_DB_URL:-}" ]; then
            if echo "$SUPABASE_DB_URL" | grep -q '@db\.'; then
              echo "SUPABASE_DB_URL uses db.*.supabase.co (IPv6) — GitHub Actions cannot reach it."
              echo "Add SUPABASE_DB_PASSWORD + SUPABASE_PROJECT_REF, or use a *.pooler.supabase.com URI."
              exit 1
            fi
            echo "Using pg_dump with pooler URL..."
            export PGSSLMODE=require
            pg_dump "$SUPABASE_DB_URL" --no-owner --no-acl -f "$outfile"
          else
            echo "Set SUPABASE_DB_PASSWORD and SUPABASE_PROJECT_REF (recommended)."
            exit 1
          fi

          echo "Backup size: $(wc -c < "$outfile") bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: supabase-backup-${{ github.run_number }}
          path: backups/
          retention-days: 90
