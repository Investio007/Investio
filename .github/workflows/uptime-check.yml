name: Uptime checks

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check Vercel auth page
        run: |
          curl -fsSL --max-time 30 "https://investio-wheat.vercel.app/auth" -o /dev/null
          echo "Vercel /auth OK"

      - name: Check Railway API health
        run: |
          body=$(curl -fsSL --max-time 30 "https://investio-production.up.railway.app/api/health")
          echo "$body" | grep -q '"status"\s*:\s*"ok"'
          echo "Railway /api/health OK"
