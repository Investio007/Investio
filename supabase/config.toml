# Local Supabase reference config (hosted project uses GitHub Actions sync script)
# https://supabase.com/docs/guides/cli/config

[auth]
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/auth/callback"]

[auth.external.google]
enabled = true
skip_nonce_check = true

[auth.external.github]
enabled = true

[auth.external.apple]
enabled = true
